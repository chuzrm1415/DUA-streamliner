trigger:
  branches:
    include:
      - main
      - staging
      - develop

variables:
  NODE_VERSION: '22.x'
  DOCKER_REGISTRY: 'duastreamlineracr.azurecr.io'
  IMAGE_API: '$(DOCKER_REGISTRY)/dua-api'
  IMAGE_WORKER: '$(DOCKER_REGISTRY)/dua-worker'

stages:
  # ── Build & Test ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildJob
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Use Node.js $(NODE_VERSION)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run lint
            displayName: ESLint

          - script: npm run prisma:generate
            displayName: Generate Prisma client

          - script: npm run test -- --ci --coverage
            displayName: Unit tests
            env:
              DATABASE_URL: postgresql://postgres:password@localhost:5432/dua_test

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/junit.xml'
            condition: always()
            displayName: Publish test results

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: coverage/cobertura-coverage.xml
            condition: always()
            displayName: Publish coverage

          - script: npm run build
            displayName: Build TypeScript

  # ── Docker Build & Push ───────────────────────────────────────────────────
  - stage: Dockerize
    displayName: Docker Build & Push
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DockerJob
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build & push API image
            inputs:
              containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
              repository: dua-api
              command: buildAndPush
              Dockerfile: Dockerfile
              buildContext: .
              tags: |
                $(Build.BuildId)
                latest
              arguments: '--target api'

          - task: Docker@2
            displayName: Build & push Worker image
            inputs:
              containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
              repository: dua-worker
              command: buildAndPush
              Dockerfile: Dockerfile
              buildContext: .
              tags: |
                $(Build.BuildId)
                latest
              arguments: '--target worker'

  # ── Deploy: Development ───────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy → Development
    dependsOn: Dockerize
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        environment: development
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureContainerApps@1
                  displayName: Deploy API to dev
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-api-dev
                    resourceGroup: dua-dev-rg
                    imageToDeploy: '$(IMAGE_API):$(Build.BuildId)'

                - task: AzureContainerApps@1
                  displayName: Deploy Worker to dev
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-worker-dev
                    resourceGroup: dua-dev-rg
                    imageToDeploy: '$(IMAGE_WORKER):$(Build.BuildId)'

  # ── Deploy: Staging ───────────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: Deploy → Staging
    dependsOn: Dockerize
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployStagingJob
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureContainerApps@1
                  displayName: Deploy API to staging
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-api-staging
                    resourceGroup: dua-staging-rg
                    imageToDeploy: '$(IMAGE_API):$(Build.BuildId)'

                - task: AzureContainerApps@1
                  displayName: Deploy Worker to staging
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-worker-staging
                    resourceGroup: dua-staging-rg
                    imageToDeploy: '$(IMAGE_WORKER):$(Build.BuildId)'

  # ── Deploy: Production (manual approval required) ─────────────────────────
  - stage: DeployProd
    displayName: Deploy → Production
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: production   # manual approval gate configured in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureContainerApps@1
                  displayName: Deploy API to production
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-api-prod
                    resourceGroup: dua-prod-rg
                    imageToDeploy: '$(IMAGE_API):$(Build.BuildId)'

                - task: AzureContainerApps@1
                  displayName: Deploy Worker to production
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    containerAppName: dua-worker-prod
                    resourceGroup: dua-prod-rg
                    imageToDeploy: '$(IMAGE_WORKER):$(Build.BuildId)'
