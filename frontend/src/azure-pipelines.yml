trigger:
  branches:
    include:
      - main
      - staging
      - develop

variables:
  NODE_VERSION: "22.x"
  APP_SERVICE_NAME_DEV: "dua-frontend-dev"
  APP_SERVICE_NAME_STAGING: "dua-frontend-staging"
  APP_SERVICE_NAME_PROD: "dua-frontend-prod"

stages:
  # ── Build & Test ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildJob
        displayName: Install, Lint, Test, Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Use Node.js $(NODE_VERSION)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run lint
            displayName: ESLint

          - script: npm run test -- --ci --coverage
            displayName: Unit & Component Tests

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "**/junit.xml"
            condition: always()

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: coverage/cobertura-coverage.xml
            condition: always()

          - script: npm run build
            displayName: Next.js Build
            env:
              NEXT_PUBLIC_API_BASE_URL: $(NEXT_PUBLIC_API_BASE_URL)

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: .next
              includeRootFolder: false
              archiveFile: $(Build.ArtifactStagingDirectory)/build.zip

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)
              artifactName: drop

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  - stage: E2E
    displayName: E2E Tests (Staging)
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - job: E2EJob
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: npm ci
          - script: npx playwright install --with-deps chromium
          - script: npm run test:e2e
            env:
              PLAYWRIGHT_BASE_URL: https://$(APP_SERVICE_NAME_STAGING).azurewebsites.net

  # ── Deploy: Development ───────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy → Development
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        environment: development
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appName: $(APP_SERVICE_NAME_DEV)
                    package: $(Pipeline.Workspace)/drop/build.zip

  # ── Deploy: Staging ───────────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: Deploy → Staging
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployStagingJob
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appName: $(APP_SERVICE_NAME_STAGING)
                    package: $(Pipeline.Workspace)/drop/build.zip

  # ── Deploy: Production ───────────────────────────────────────────────────
  - stage: DeployProd
    displayName: Deploy → Production
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appName: $(APP_SERVICE_NAME_PROD)
                    package: $(Pipeline.Workspace)/drop/build.zip
